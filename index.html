<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Levi Rankin</title>
    <link rel="icon" href="/tab.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.dataset.theme='light';</script>
    <style>html,body{background:#000;color:#fff}html[data-theme=light],html[data-theme=light] body{background:#f8f8f8;color:#0a0a0a}a{color:inherit;text-decoration:none}body{opacity:0}</style>
  </head>
  <body>
    <div class="linkedin-wrap">
      <button
        class="linkedin-btn"
        popovertarget="qr-popup"
        aria-label="Show LinkedIn QR code"
      >
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </button>
      <button class="theme-btn" id="theme-toggle" aria-label="Toggle color theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="4.93" y1="19.07" x2="6.34" y2="17.66"/><line x1="17.66" y1="6.34" x2="19.07" y2="4.93"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>

    <div id="qr-popup" popover class="qr-popup">
      <img src="/linkedinqr.png" alt="LinkedIn QR code" width="620" height="620" />
    </div>

    <div class="page-home">
      <div class="home-content">
        <div class="hero-card">
          <h1 class="hero-name">Levi S. Rankin</h1>
          <div class="hero-divider"></div>
          <p class="hero-role">Engineer</p>
          <p class="hero-domains">Distributed systems · Databases · AI systems</p>
          <button class="hero-expand-btn" id="hero-expand" aria-label="Show bio">+</button>
          <div class="hero-bio" id="hero-bio">
            <div class="hero-bio-inner">
              <div class="hero-divider"></div>
              <p class="hero-bio-text">Generalist Software Engineer with product and design judgement. I care about deep data-oriented problems applied to interesting industries.</p>
            </div>
          </div>
        </div>

        <nav class="home-nav">
          <a href="/writings.html">writing</a>
          <a href="https://www.linkedin.com/in/levirankin/" target="_blank" rel="noopener noreferrer">linkedin</a>
          <a href="https://github.com/Urenzu" target="_blank" rel="noopener noreferrer">github</a>
          <a href="/resume.pdf" target="_blank" rel="noopener noreferrer">resume</a>
        </nav>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
